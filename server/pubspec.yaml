name: luma_sync_server
description: Self-hosted sync server for the luma app. Stores end-to-end
  encrypted blobs per account; it can never read user data.
publish_to: none
version: 1.0.0

environment:
  sdk: ^3.0.0

dependencies:
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  crypto: ^3.0.6

dev_dependencies:
  lints: ^4.0.0

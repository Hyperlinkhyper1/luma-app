name: luma_sync_server
description: Self-hosted sync server for the luma app. Stores end-to-end
  encrypted blobs per account; it can never read user data.
publish_to: none
version: 1.0.0

environment:
  sdk: ^3.0.0

dependencies:
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_web_socket: ^2.0.1
  web_socket_channel: ^3.0.1
  crypto: ^3.0.6
  mailer: ^6.1.0

dev_dependencies:
  lints: ^4.0.0

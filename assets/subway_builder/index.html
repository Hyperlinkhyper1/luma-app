<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Subway Builder</title>
<link rel="stylesheet" href="vendor/maplibre-gl.css">
<style>
  :root {
    --bg: #0b0e14;
    --panel: #10141c;
    --panel2: #161b25;
    --panel3: #1d2330;
    --border: #242b38;
    --border-soft: #1e2530;
    --text: #e2e8f2;
    --muted: #8b96a8;
    --faint: #5d6779;
    --accent: #4da3ff;
    --accent-ink: #06121f;
    --good: #45c274;
    --warn: #eab03e;
    --bad: #e8615c;
    --m-metro: #e05252;
    --m-tram: #2e9e4f;
    --m-bus: #f2a33c;
    --m-train: #7a6ff0;
    --m-hst: #d452c4;
    --r-sm: 6px;
    --r-md: 9px;
    --r-lg: 13px;
    font-size: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, -apple-system, sans-serif; }
  #app { display: flex; flex-direction: column; width: 100%; height: 100%; }

  .ic { width: 15px; height: 15px; flex: 0 0 auto; stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .tint-metro { color: var(--m-metro); } .tint-tram { color: var(--m-tram); }
  .tint-bus { color: var(--m-bus); } .tint-train { color: var(--m-train); }

  button { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 5px 10px; font-size: 12.5px; cursor: pointer;
    font-family: inherit; transition: border-color .12s, background .12s, color .12s; }
  button:hover { border-color: #38445a; background: var(--panel3); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  button.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
  button:disabled { opacity: .38; cursor: default; }
  button.danger { border-color: #4c2f34; color: #ff9d9d; }
  button.danger:hover { border-color: var(--bad); background: #241418; }
  button.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
  button.mini { padding: 2px 6px; font-size: 12px; border-radius: 5px; }
  button.ghostbtn { background: transparent; border-color: transparent; color: var(--muted); }
  button.ghostbtn:hover { color: var(--text); background: var(--panel3); }

  /* ── Top bar ─────────────────────────────── */
  #topbar { display: flex; align-items: center; gap: 10px; padding: 7px 12px; height: 46px;
    background: var(--panel); border-bottom: 1px solid var(--border); flex: 0 0 auto; }
  #topbar .logo { display: flex; align-items: center; gap: 8px; font-weight: 700;
    letter-spacing: .2px; margin-right: 2px; font-size: 13.5px; }
  #topbar .logo .ic { width: 18px; height: 18px; color: var(--accent); }
  .tstat { display: flex; align-items: center; gap: 7px; background: var(--panel2);
    border: 1px solid var(--border-soft); border-radius: var(--r-sm); padding: 4px 10px;
    font-size: 12.5px; white-space: nowrap; }
  .tstat .ic { width: 13px; height: 13px; color: var(--faint); }
  .tstat b { font-weight: 600; font-variant-numeric: tabular-nums; min-width: 3ch; }
  #stat-money.neg { color: var(--bad); }
  #speedctl { display: flex; background: var(--panel2); border: 1px solid var(--border-soft);
    border-radius: var(--r-sm); overflow: hidden; }
  #speedctl button { width: 38px; border: none; border-radius: 0; padding: 5px 0; background: transparent; font-variant-numeric: tabular-nums; }
  #speedctl button + button { border-left: 1px solid var(--border-soft); }
  #speedctl button.active { background: var(--accent); color: var(--accent-ink); }
  #speedctl button .ic { width: 12px; height: 12px; }
  .spacer { flex: 1; }

  /* ── Main area ───────────────────────────── */
  #main { display: flex; flex: 1 1 auto; min-height: 0; }
  #left { width: 236px; flex: 0 0 auto; background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 12px 10px 16px; display: flex; flex-direction: column; gap: 16px; }
  #left::-webkit-scrollbar { width: 8px; }
  #left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sect h4 { font-size: 10.5px; letter-spacing: .9px; color: var(--faint); text-transform: uppercase;
    margin: 0 4px 7px; font-weight: 600; }

  /* mode picker */
  #modes { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .modebtn { display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 4px 7px; border: 1px solid var(--border-soft); background: var(--panel2);
    border-radius: var(--r-md); font-size: 11px; color: var(--muted); }
  .modebtn .ic { width: 17px; height: 17px; }
  .modebtn:hover { color: var(--text); }
  .modebtn.active { color: var(--text); font-weight: 600; background: var(--panel3); }
  #mode-metro.active { border-color: var(--m-metro); box-shadow: inset 0 -2px 0 var(--m-metro); }
  #mode-tram.active { border-color: var(--m-tram); box-shadow: inset 0 -2px 0 var(--m-tram); }
  #mode-bus.active { border-color: var(--m-bus); box-shadow: inset 0 -2px 0 var(--m-bus); }
  #mode-train.active { border-color: var(--m-train); box-shadow: inset 0 -2px 0 var(--m-train); }
  #mode-hst.active { border-color: var(--m-hst); box-shadow: inset 0 -2px 0 var(--m-hst); }
  #mode-metro .ic { color: var(--m-metro); } #mode-tram .ic { color: var(--m-tram); }
  #mode-bus .ic { color: var(--m-bus); } #mode-train .ic { color: var(--m-train); }
  #mode-hst .ic { color: var(--m-hst); }
  #mode-hst { grid-column: span 2; flex-direction: row; gap: 7px; padding: 7px 4px; }

  .toolbtn { display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
    justify-content: flex-start; padding: 6px 9px; margin: 1px 0; border: 1px solid transparent;
    background: transparent; border-radius: var(--r-sm); font-size: 12.5px; color: var(--text); }
  .toolbtn .ic { color: var(--muted); }
  .toolbtn:hover { background: var(--panel2); border-color: transparent; }
  .toolbtn.active { background: var(--accent); color: var(--accent-ink); font-weight: 600; }
  .toolbtn.active .ic { color: var(--accent-ink); }
  .toolbtn kbd { margin-left: auto; font-size: 10px; color: var(--faint); border: 1px solid var(--border);
    border-radius: 4px; padding: 0 5px; background: var(--panel2); font-family: inherit; }
  .toolbtn.active kbd { color: var(--accent-ink); border-color: rgba(0,0,0,.25); background: transparent; }

  /* line list */
  #linelist { display: flex; flex-direction: column; gap: 3px; }
  #linelist .empty { color: var(--muted); font-size: 11.5px; padding: 4px 6px; line-height: 1.5; }
  .linerow { display: flex; align-items: center; gap: 8px; padding: 6px 7px; border-radius: var(--r-sm);
    cursor: pointer; border: 1px solid transparent; font-size: 12px; }
  .linerow:hover { background: var(--panel2); }
  .linerow.sel { border-color: var(--accent); background: var(--panel2); }
  .linerow .sw { width: 22px; height: 22px; border-radius: 6px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; }
  .linerow .sw .ic { width: 13px; height: 13px; color: #fff; stroke-width: 2; }
  .linerow .lcol { display: flex; flex-direction: column; min-width: 0; flex: 1; gap: 1px; }
  .linerow .lname { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .linerow .lmeta { color: var(--muted); font-size: 10.5px; white-space: nowrap; }
  .linerow .tctl { display: flex; align-items: center; gap: 3px; flex: 0 0 auto; }
  .linerow .tcount { font-size: 11px; color: var(--muted); min-width: 16px; text-align: center;
    font-variant-numeric: tabular-nums; }
  #btn-newline { width: 100%; margin-top: 7px; }

  /* finance */
  .finrow { display: flex; align-items: center; gap: 6px; padding: 3px 4px; font-size: 12px; }
  .finrow .lbl { color: var(--muted); }
  .finrow b { font-variant-numeric: tabular-nums; }
  #funding-line { color: var(--muted); font-size: 11px; padding: 3px 4px; line-height: 1.55; }
  #loan-out { color: var(--warn); font-size: 11px; padding: 0 4px; margin-left: auto; }

  /* ── Map + floats ────────────────────────── */
  #canvaswrap { position: relative; flex: 1 1 auto; min-width: 0; overflow: hidden; background: #dfdcd3; }
  #map { position: absolute; inset: 0; }
  #map .maplibregl-ctrl-attrib { font-size: 10px; opacity: .75; }
  #loading { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; background: rgba(11,14,20,.85); z-index: 12; }
  #loading .spin { width: 34px; height: 34px; border-radius: 50%; border: 3px solid var(--border);
    border-top-color: var(--accent); animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { color: var(--muted); font-size: 12.5px; max-width: 400px; text-align: center; line-height: 1.55; }
  #bootstatus { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    background: var(--bg); z-index: 11; }
  .bs-card { display: flex; flex-direction: column; align-items: center; gap: 10px; max-width: 380px;
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 22px 26px; text-align: center; font-size: 13px; }
  .bs-err { color: var(--bad); font-size: 11px; line-height: 1.5; max-width: 100%; overflow-wrap: anywhere; }
  .bs-sub { color: var(--muted); font-size: 11.5px; line-height: 1.5; }

  #hint { position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(11,14,20,.92); border: 1px solid var(--border); color: var(--text);
    padding: 7px 15px; border-radius: 999px; font-size: 12px; pointer-events: none;
    max-width: 72%; text-align: center; display: none; z-index: 5; }
  #toasts { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 8; pointer-events: none; }
  .toast { display: flex; align-items: center; gap: 8px; background: rgba(13,17,24,.95);
    border: 1px solid var(--border); border-radius: var(--r-md);
    padding: 8px 14px; font-size: 12.5px; opacity: 0; transform: translateY(8px);
    transition: opacity .25s, transform .25s; max-width: 480px; text-align: left; }
  .toast .ic { color: var(--muted); }
  .toast.show { opacity: 1; transform: none; }
  .toast.bad { border-color: #593034; }
  .toast.bad .ic { color: var(--bad); }
  .toast.good { border-color: #2b5340; }
  .toast.good .ic { color: var(--good); }

  #infopanel { position: absolute; top: 14px; right: 14px; width: 262px; background: rgba(16,20,28,.97);
    border: 1px solid var(--border); border-radius: var(--r-lg); padding: 12px 14px; display: none;
    z-index: 6; box-shadow: 0 8px 28px rgba(0,0,0,.35); }
  .ip-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .ip-head .ic { width: 16px; height: 16px; }
  .ip-title { font-weight: 700; font-size: 13.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ip-row { display: flex; justify-content: space-between; gap: 8px; font-size: 12px;
    color: var(--muted); padding: 3px 0; align-items: center; }
  .ip-row b { color: var(--text); font-weight: 600; display: inline-flex; gap: 3px; align-items: center;
    font-variant-numeric: tabular-nums; }
  .ip-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.big { width: 13px; height: 13px; }
  .warn { color: var(--warn); } .good { color: var(--good); } .bad { color: var(--bad); }

  #milestone { position: absolute; top: 64px; left: 50%; transform: translate(-50%,-16px) scale(.95);
    background: linear-gradient(135deg, #16281d, #10221a); border: 1px solid #2b5340;
    border-radius: var(--r-lg); padding: 13px 24px; text-align: center; opacity: 0;
    transition: opacity .35s, transform .35s; pointer-events: none; z-index: 9; }
  #milestone.show { opacity: 1; transform: translate(-50%,0) scale(1); }
  #milestone-title { font-weight: 700; font-size: 15px; color: #7ee2a0; }
  #milestone-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

  /* ── Modals ──────────────────────────────── */
  #modalback { position: fixed; inset: 0; background: rgba(4,6,10,.74); display: none;
    align-items: center; justify-content: center; z-index: 20; }
  #modal { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 22px 24px; width: 460px; max-width: 94vw; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 18px 50px rgba(0,0,0,.5); }
  #modal.wide { width: 800px; }
  #modal h2 { font-size: 17px; margin-bottom: 6px; }
  #modal h3 { font-size: 11px; color: var(--faint); margin: 16px 0 7px; text-transform: uppercase; letter-spacing: .8px; }
  #modal .sub { color: var(--muted); font-size: 12.5px; line-height: 1.55; }
  .mrow { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  kbd { border: 1px solid var(--border); border-radius: 4px; padding: 0 5px; background: var(--panel2);
    font-size: 11px; font-family: inherit; }

  .brandrow { text-align: center; margin-bottom: 16px; }
  .brandrow .brandmark { width: 30px; height: 30px; color: var(--accent); display: inline-block; }
  .brand { display: block; font-size: 22px; font-weight: 800; letter-spacing: .3px; margin-top: 6px; }
  .searchrow { display: flex; gap: 8px; margin: 6px 0 10px; }
  .searchrow input { flex: 1; }
  input[type=text] { background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 7px 10px; font-size: 12.5px; font-family: inherit; user-select: text; }
  input[type=text]:focus { outline: none; border-color: var(--accent); }

  .citygrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 9px; margin-top: 8px; }
  .citycard { border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px 13px;
    cursor: pointer; background: var(--panel2); transition: border-color .12s, transform .12s; }
  .citycard:hover { border-color: var(--accent); transform: translateY(-1px); }
  .cc-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 13.5px; }
  .pill { font-size: 10px; padding: 1px 8px; border-radius: 999px; font-weight: 600;
    background: #1d2c44; color: #8fc1ff; }
  .cc-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .cc-save { margin-top: 7px; font-size: 10.5px; color: var(--good); }
  .cc-fresh, .cc-del { color: var(--muted); text-decoration: underline; }

  .helpgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 18px; margin: 14px 0; }
  .helpgrid b { font-size: 12.5px; }
  .helpgrid p { color: var(--muted); font-size: 11.5px; line-height: 1.55; margin-top: 3px; }
  .helpgrid i { color: var(--text); font-style: normal; font-weight: 600; }

  .statgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 8px; margin-top: 10px; }
  .stat { background: var(--panel2); border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: 9px 11px; }
  .stat .v { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat .l { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
  .stat .l i { font-style: normal; opacity: .8; }
  .modesplit { margin: 14px 0 4px; }
  .ms-bar { display: flex; height: 12px; border-radius: 999px; overflow: hidden; background: var(--panel3); }
  .ms-bar span { display: block; height: 100%; }
  .ms-legend { display: flex; gap: 16px; margin-top: 7px; font-size: 11px; color: var(--muted); }
  .ms-legend i { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 5px; }
  .modebars { display: flex; flex-direction: column; gap: 5px; }
  .modebar { display: flex; align-items: center; gap: 8px; font-size: 11.5px; }
  .mb-label { display: flex; align-items: center; gap: 5px; width: 74px; color: var(--muted); }
  .mb-track { flex: 1; height: 8px; background: var(--panel3); border-radius: 999px; overflow: hidden; }
  .mb-track span { display: block; height: 100%; border-radius: 999px; }
  .mb-val { width: 46px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
  .chartrow { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 6px; }
  .chartrow canvas { width: 100%; background: var(--panel2); border: 1px solid var(--border-soft); border-radius: var(--r-md); }
  .stbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .stbl td { padding: 5px 6px; border-bottom: 1px solid var(--border-soft); }
  .stbl td:last-child { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
</style>
</head>

  <symbol id="i-walk" viewBox="0 0 24 24"><circle cx="13" cy="4.5" r="2"/><path d="M13 7.5 9.5 10l-1 4.5M13 7.5l2 4 3.5 1M12.5 12l-1.5 4-3 4.5M12.5 12l2.5 4 1 4.5"/></symbol>
  <symbol id="i-gauge" viewBox="0 0 24 24"><path d="M4 14a8 8 0 1 1 16 0"/><path d="M12 14l4-5"/><path d="M2.5 19h19"/></symbol>
  <symbol id="i-chart" viewBox="0 0 24 24"><path d="M4 20V4M4 20h16"/><path d="M8 16v-5M12 16V8M16 16v-3"/></symbol>

  <symbol id="i-help" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M9.5 9.5a2.5 2.5 0 1 1 3.8 2.1c-.9.6-1.3 1-1.3 2.1M12 17h.01"/></symbol>

<script>
/* Some embedded webviews (WebView2 composition mode, background panes)
   report the page as hidden, which freezes requestAnimationFrame — and with
   it MapLibre's whole tile-loading/render loop, leaving a blank map.
   Hybrid scheduler: use real rAF when it ticks, fall back to timers when it
   doesn't, so the map always makes progress. */
(function () {
  const nativeRAF = window.requestAnimationFrame.bind(window);
  const cbs = new Map();
  let nextId = 1;
  let scheduled = false;
  function flush(t) {
    scheduled = false;
    const list = [...cbs.entries()];
    cbs.clear();
    for (const [, cb] of list) {
      try { cb(t); } catch (e) { setTimeout(() => { throw e; }); }
    }
  }
  function schedule() {
    if (scheduled) return;
    scheduled = true;
    let done = false;
    nativeRAF((t) => { if (!done) { done = true; flush(t); } });
    setTimeout(() => { if (!done) { done = true; flush(performance.now()); } }, 90);
  }
  window.requestAnimationFrame = function (cb) {
    const id = nextId++;
    cbs.set(id, cb);
    schedule();
    return id;
  };
  window.cancelAnimationFrame = function (id) { cbs.delete(id); };
})();
</script>

<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MetroPlan — Stadsplanner</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #141a22;
    --panel2: #1b222d;
    --panel3: #222b38;
    --border: #28313f;
    --border-soft: #202834;
    --text: #dce4ef;
    --muted: #8391a6;
    --accent: #4da3ff;
    --accent-ink: #06121f;
    --good: #4ecb71;
    --warn: #f3b13e;
    --bad: #ef5b5b;
    --r-sm: 6px;
    --r-md: 8px;
    --r-lg: 12px;
    font-size: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg);
    color: var(--text); font-family: "Segoe UI", system-ui, sans-serif; }
  #app { display: flex; flex-direction: column; width: 100%; height: 100%; }

  /* ── Iconen ────────────────────────────────── */
  .ic { width: 14px; height: 14px; flex: 0 0 auto; stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; vertical-align: -2px; }
  .ic.lg { width: 16px; height: 16px; }

  /* ── Bovenbalk ─────────────────────────────── */
  #topbar { display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: var(--panel); border-bottom: 1px solid var(--border); flex: 0 0 auto; }
  #topbar .logo { display: flex; align-items: center; gap: 6px; font-weight: 700;
    color: var(--accent); letter-spacing: .4px; margin-right: 4px; }
  .tstat { display: flex; align-items: center; gap: 6px; background: var(--panel2);
    border: 1px solid var(--border-soft); border-radius: var(--r-sm); padding: 4px 9px;
    font-size: 12.5px; white-space: nowrap; }
  .tstat b { font-weight: 600; font-variant-numeric: tabular-nums; }
  .tstat .ic { color: var(--muted); }
  .tstat .lbl { color: var(--muted); font-size: 11px; }
  #speedctl { display: flex; background: var(--panel2); border: 1px solid var(--border-soft);
    border-radius: var(--r-sm); overflow: hidden; }
  #speedctl button { width: 30px; border: none; border-radius: 0; padding: 4px 0;
    display: flex; align-items: center; justify-content: center; background: transparent; }
  #speedctl button + button { border-left: 1px solid var(--border-soft); }
  #speedctl button.active { background: var(--accent); color: var(--accent-ink); }
  button { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 4px 9px; font-size: 12.5px; cursor: pointer;
    font-family: inherit; transition: border-color .12s, background .12s; }
  button:hover { border-color: var(--accent); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  button.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
  button:disabled { opacity: .4; cursor: default; }
  select { background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 4px 6px; font-size: 12.5px; font-family: inherit; }
  input[type=text], input[type=number] { background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--r-sm); padding: 4px 7px;
    font-size: 12.5px; font-family: inherit; width: 100%; user-select: text; }
  input[type=text]:focus, input[type=number]:focus { outline: none; border-color: var(--accent); }
  .spacer { flex: 1; }

  /* ── Hoofdgebied ───────────────────────────── */
  #main { display: flex; flex: 1 1 auto; min-height: 0; }

  /* Linker gereedschap */
  #left { width: 208px; flex: 0 0 auto; background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 8px 6px; }
  .toolcat { margin-bottom: 2px; }
  .toolcat > .cathead { display: flex; align-items: center; gap: 7px; padding: 6px 8px;
    font-size: 11.5px; font-weight: 600; letter-spacing: .3px; color: var(--muted);
    cursor: pointer; border-radius: var(--r-sm); }
  .toolcat > .cathead:hover { background: var(--panel2); color: var(--text); }
  .toolcat > .cathead .chev { margin-left: auto; opacity: .6; transition: transform .15s; }
  .toolcat.open > .cathead .chev { transform: rotate(180deg); }
  .toolcat .catbody { display: none; padding: 2px 0 6px; }
  .toolcat.open .catbody { display: block; }
  .toolbtn { display: flex; align-items: center; gap: 7px; width: 100%; text-align: left;
    justify-content: flex-start; padding: 5px 8px; margin: 1px 0; border: 1px solid transparent;
    background: transparent; border-radius: var(--r-sm); font-size: 12.5px; }
  .toolbtn:hover { background: var(--panel2); border-color: transparent; }
  .toolbtn.active { background: var(--accent); color: var(--accent-ink); font-weight: 600; }
  .toolbtn .sw { width: 12px; height: 12px; border-radius: 3px; flex: 0 0 auto; border: 1px solid rgba(255,255,255,.25); }
  .toolbtn .price { margin-left: auto; font-size: 10.5px; color: var(--muted); display: inline-flex; align-items: center; gap: 3px; }
  .toolbtn .price .ic { width: 10px; height: 10px; }
  .toolbtn.active .price { color: var(--accent-ink); }
  .toolbtn.locked { opacity: .38; }
  .toolbtn.locked .price { color: var(--warn); }

  /* Canvas */
  #canvaswrap { position: relative; flex: 1 1 auto; min-width: 0; overflow: hidden; background: #0a0d12; }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; }
  #tooltip { position: absolute; pointer-events: none; background: rgba(13,17,23,.95);
    border: 1px solid var(--border); border-radius: var(--r-sm); padding: 6px 9px; font-size: 11.5px;
    line-height: 1.45; display: none; z-index: 5; max-width: 240px;
    box-shadow: 0 4px 16px rgba(0,0,0,.35); }
  #hint { position: absolute; left: 10px; bottom: 10px; background: rgba(13,17,23,.82);
    border: 1px solid var(--border-soft); border-radius: var(--r-sm); padding: 5px 10px;
    font-size: 11px; color: var(--muted); pointer-events: none; z-index: 4; }
  #hint b { color: var(--text); font-weight: 600; }
  #minimap { position: absolute; right: 10px; bottom: 10px; border: 1px solid var(--border);
    border-radius: var(--r-md); background: #000; z-index: 4; opacity: .92; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,.35); }
  #toasts { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 8;
    display: flex; flex-direction: column; gap: 6px; align-items: center; pointer-events: none; }
  .toast { background: rgba(19,25,34,.96); border: 1px solid var(--border); border-left: 3px solid var(--accent);
    border-radius: var(--r-sm); padding: 7px 14px; font-size: 12.5px; max-width: 460px;
    box-shadow: 0 4px 16px rgba(0,0,0,.35); animation: fadein .2s; }
  .toast.warn { border-left-color: var(--warn); }
  .toast.bad { border-left-color: var(--bad); }
  .toast.good { border-left-color: var(--good); }
  @keyframes fadein { from { opacity: 0; transform: translateY(-6px);} to { opacity: 1; } }

  /* Rechter paneel */
  #right { width: 300px; flex: 0 0 auto; background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; min-height: 0; }
  #righttabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  #righttabs button { flex: 1 1 auto; border: none; border-radius: 0; padding: 8px 4px; font-size: 11.5px;
    background: transparent; color: var(--muted); border-bottom: 2px solid transparent; }
  #righttabs button:hover { color: var(--text); }
  #righttabs button.active { background: transparent; color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  #rightbody { flex: 1 1 auto; overflow-y: auto; padding: 10px; font-size: 12.5px; }
  #rightbody h3 { font-size: 11.5px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase;
    margin: 14px 0 6px; color: var(--muted); }
  #rightbody h3:first-child { margin-top: 0; }
  .kv { display: flex; justify-content: space-between; gap: 8px; padding: 2.5px 0; font-size: 12px; }
  .kv .k { color: var(--muted); }
  .kv .v { text-align: right; font-variant-numeric: tabular-nums; }
  .card { background: var(--panel2); border: 1px solid var(--border-soft); border-radius: var(--r-md);
    padding: 9px 11px; margin-bottom: 8px; }
  .card h3 { margin-top: 0; }
  .bar { height: 6px; border-radius: 3px; background: #0a0d12; overflow: hidden; margin-top: 4px; }
  .bar > div { height: 100%; border-radius: 3px; background: var(--accent); }
  .muted { color: var(--muted); font-size: 11.5px; }
  .row { display: flex; gap: 6px; align-items: center; }
  .row > * { flex: 1; }
  .techn { border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: 8px 10px;
    margin-bottom: 6px; background: var(--panel2); }
  .techn.done { border-color: var(--good); opacity: .7; }
  .techn.avail { border-color: var(--accent); }
  .techn .tname { font-weight: 600; font-size: 12.5px; }
  .techn .tdesc { color: var(--muted); font-size: 11px; margin: 2px 0 5px; }
  .polrow { display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 7px 0; border-bottom: 1px solid var(--border-soft); }
  .polrow:last-child { border-bottom: none; }
  .floorrow { display: flex; gap: 5px; align-items: center; margin: 3px 0; }
  .floorrow .fnum { width: 26px; color: var(--muted); font-size: 11px; flex: 0 0 auto; }
  .floorrow select { flex: 1; }
  .taxrow { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .taxrow .k { flex: 1; color: var(--muted); font-size: 12px; }
  .taxrow input[type=range] { flex: 1.4; accent-color: var(--accent); }
  .taxrow .v { width: 38px; text-align: right; font-size: 12px; font-variant-numeric: tabular-nums; }

  /* Onderbalk */
  #bottombar { display: flex; align-items: center; gap: 6px; padding: 5px 10px;
    background: var(--panel); border-top: 1px solid var(--border); flex: 0 0 auto; overflow-x: auto; }
  .chip { display: flex; align-items: center; gap: 6px; background: var(--panel2);
    border: 1px solid var(--border); border-radius: 999px; padding: 3px 11px; font-size: 12px;
    white-space: nowrap; cursor: default; }
  .chip .ic { width: 12px; height: 12px; color: var(--muted); }
  .chip b { font-weight: 600; font-variant-numeric: tabular-nums; }
  #news { flex: 1; min-width: 120px; color: var(--muted); font-size: 12px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; text-align: right; }

  /* ── Modal (save-scherm / nieuw spel) ─────── */
  #modal { position: fixed; inset: 0; z-index: 20; display: none; align-items: center;
    justify-content: center; background: rgba(4,7,11,.6); backdrop-filter: blur(3px); }
  #modal.open { display: flex; }
  #modal-box { width: 440px; max-width: 92vw; max-height: 84vh; display: flex; flex-direction: column;
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-lg);
    box-shadow: 0 18px 50px rgba(0,0,0,.5); overflow: hidden; }
  #modal-head { display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px; border-bottom: 1px solid var(--border); font-weight: 700; }
  #modal-head button { border: none; background: transparent; color: var(--muted); padding: 4px; }
  #modal-head button:hover { color: var(--text); }
  #modal-body { padding: 13px 14px; overflow-y: auto; font-size: 12.5px; }
  #modal-body .card { background: var(--panel2); border: 1px solid var(--border-soft);
    border-radius: var(--r-md); padding: 10px 12px; margin-bottom: 8px; }
  #modal-body .row { display: flex; gap: 6px; margin-top: 8px; }
  #modal-body .row > button { flex: 1; }
  .modebtn { display: block; width: 100%; text-align: left; padding: 12px 14px; margin-bottom: 10px;
    border-radius: 10px; border: 1px solid var(--border); background: var(--panel2); }
  .modebtn:hover { border-color: var(--accent); }
  .modebtn b { font-size: 14px; }
  .modebtn .muted { display: block; margin-top: 3px; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--panel3); }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>

<div id="app">
  <div id="topbar">
    <span class="logo"><svg class="ic lg"><use href="#i-building"/></svg>MetroPlan</span>
    <div class="tstat"><svg class="ic"><use href="#i-calendar"/></svg><b id="ui-date">1 jan 1925</b></div>
    <div id="speedctl">
      <button id="spd0" title="Pauze"><svg class="ic"><use href="#i-pause"/></svg></button>
      <button id="spd1" class="active" title="Normaal"><svg class="ic"><use href="#i-play"/></svg></button>
      <button id="spd2" title="Snel"><svg class="ic"><use href="#i-ff2"/></svg></button>
      <button id="spd3" title="Zeer snel"><svg class="ic"><use href="#i-ff3"/></svg></button>
    </div>
    <div class="tstat"><svg class="ic"><use href="#i-banknote"/></svg><b id="ui-money">€ 0</b><span class="lbl" id="ui-cashflow"></span></div>
    <div class="tstat"><svg class="ic"><use href="#i-users"/></svg><b id="ui-pop">0</b></div>
    <div class="tstat"><svg class="ic"><use href="#i-flask"/></svg><b id="ui-rp">0</b></div>
    <div class="tstat" id="ui-phase" title="Stadsfase">Fase 1 · Dorp</div>
    <div class="spacer"></div>
    <select id="heatmapsel" title="Data-weergave (heatmap)"></select>
    <button id="btn-save" title="Opslaan &amp; laden"><svg class="ic"><use href="#i-save"/></svg></button>
    <button id="btn-new" title="Nieuwe kaart"><svg class="ic"><use href="#i-map"/></svg></button>
  </div>

  <div id="main">
    <div id="left"></div>
    <div id="canvaswrap">
      <canvas id="canvas"></canvas>
      <div id="tooltip"></div>
      <div id="hint"><b>Rechtermuisknop</b> schuiven · <b>scroll</b> zoomen · <b>G</b> grid · <b>S</b> snappen · <b>Alt</b> vrij plaatsen</div>
      <canvas id="minimap" width="150" height="150"></canvas>
      <div id="toasts"></div>

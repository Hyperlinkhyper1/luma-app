<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MetroPlan — Stadsplanner</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b23;
    --panel2: #1d2430;
    --border: #2a3342;
    --text: #dbe3ee;
    --muted: #8494ab;
    --accent: #4da3ff;
    --good: #4ecb71;
    --warn: #f3b13e;
    --bad: #ef5b5b;
    font-size: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg);
    color: var(--text); font-family: "Segoe UI", system-ui, sans-serif; }
  #app { display: flex; flex-direction: column; width: 100%; height: 100%; }

  /* ── Bovenbalk ─────────────────────────────── */
  #topbar { display: flex; align-items: center; gap: 10px; padding: 6px 10px;
    background: var(--panel); border-bottom: 1px solid var(--border); flex: 0 0 auto; }
  #topbar .logo { font-weight: 700; color: var(--accent); letter-spacing: .5px; margin-right: 4px; }
  .tstat { display: flex; align-items: center; gap: 5px; background: var(--panel2);
    border: 1px solid var(--border); border-radius: 6px; padding: 3px 9px; font-size: 12.5px; white-space: nowrap; }
  .tstat b { font-weight: 600; }
  .tstat .lbl { color: var(--muted); font-size: 11px; }
  #speedctl { display: flex; gap: 2px; }
  #speedctl button { width: 28px; }
  button { background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 9px; font-size: 12.5px; cursor: pointer; font-family: inherit; }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); color: #06121f; border-color: var(--accent); font-weight: 600; }
  button:disabled { opacity: .4; cursor: default; }
  select { background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 6px; font-size: 12.5px; font-family: inherit; }
  input[type=text], input[type=number] { background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px; font-size: 12.5px;
    font-family: inherit; width: 100%; user-select: text; }
  .spacer { flex: 1; }

  /* ── Hoofdgebied ───────────────────────────── */
  #main { display: flex; flex: 1 1 auto; min-height: 0; }

  /* Linker gereedschap */
  #left { width: 200px; flex: 0 0 auto; background: var(--panel); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 6px; }
  .toolcat { margin-bottom: 4px; }
  .toolcat > .cathead { display: flex; align-items: center; gap: 6px; padding: 6px 6px;
    font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-radius: 6px; }
  .toolcat > .cathead:hover { background: var(--panel2); }
  .toolcat .catbody { display: none; padding: 2px 0 4px; }
  .toolcat.open .catbody { display: block; }
  .toolbtn { display: flex; align-items: center; gap: 7px; width: 100%; text-align: left;
    padding: 5px 8px; margin: 1px 0; border: 1px solid transparent; background: transparent;
    border-radius: 6px; font-size: 12.5px; }
  .toolbtn:hover { background: var(--panel2); }
  .toolbtn.active { background: var(--accent); color: #06121f; font-weight: 600; }
  .toolbtn .sw { width: 12px; height: 12px; border-radius: 3px; flex: 0 0 auto; border: 1px solid rgba(255,255,255,.25); }
  .toolbtn .price { margin-left: auto; font-size: 10.5px; color: var(--muted); }
  .toolbtn.active .price { color: #06121f; }
  .toolbtn.locked { opacity: .38; }
  .toolbtn.locked .price { color: var(--warn); }

  /* Canvas */
  #canvaswrap { position: relative; flex: 1 1 auto; min-width: 0; overflow: hidden; background: #0a0d12; }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; }
  #tooltip { position: absolute; pointer-events: none; background: rgba(14,17,22,.94);
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; font-size: 11.5px;
    line-height: 1.45; display: none; z-index: 5; max-width: 240px; }
  #hint { position: absolute; left: 10px; bottom: 10px; background: rgba(14,17,22,.85);
    border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 11.5px;
    color: var(--muted); pointer-events: none; z-index: 4; }
  #minimap { position: absolute; right: 10px; bottom: 10px; border: 1px solid var(--border);
    border-radius: 6px; background: #000; z-index: 4; opacity: .92; cursor: pointer; }
  #toasts { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 8;
    display: flex; flex-direction: column; gap: 6px; align-items: center; pointer-events: none; }
  .toast { background: rgba(20,26,35,.96); border: 1px solid var(--border); border-left: 3px solid var(--accent);
    border-radius: 6px; padding: 7px 14px; font-size: 12.5px; max-width: 460px; animation: fadein .2s; }
  .toast.warn { border-left-color: var(--warn); }
  .toast.bad { border-left-color: var(--bad); }
  .toast.good { border-left-color: var(--good); }
  @keyframes fadein { from { opacity: 0; transform: translateY(-6px);} to { opacity: 1; } }

  /* Rechter paneel */
  #right { width: 300px; flex: 0 0 auto; background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; min-height: 0; }
  #righttabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  #righttabs button { flex: 1 1 auto; border: none; border-radius: 0; padding: 7px 4px; font-size: 11.5px;
    background: transparent; color: var(--muted); border-bottom: 2px solid transparent; }
  #righttabs button.active { background: transparent; color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  #rightbody { flex: 1 1 auto; overflow-y: auto; padding: 10px; font-size: 12.5px; }
  #rightbody h3 { font-size: 13px; margin: 10px 0 6px; color: var(--text); }
  #rightbody h3:first-child { margin-top: 0; }
  .kv { display: flex; justify-content: space-between; gap: 8px; padding: 2.5px 0; font-size: 12px; }
  .kv .k { color: var(--muted); }
  .kv .v { text-align: right; font-variant-numeric: tabular-nums; }
  .card { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; margin-bottom: 8px; }
  .bar { height: 6px; border-radius: 3px; background: #0a0d12; overflow: hidden; margin-top: 3px; }
  .bar > div { height: 100%; border-radius: 3px; background: var(--accent); }
  .muted { color: var(--muted); font-size: 11.5px; }
  .row { display: flex; gap: 6px; align-items: center; }
  .row > * { flex: 1; }
  .techn { border: 1px solid var(--border); border-radius: 8px; padding: 7px 9px; margin-bottom: 6px;
    background: var(--panel2); }
  .techn.done { border-color: var(--good); opacity: .75; }
  .techn.avail { border-color: var(--accent); }
  .techn .tname { font-weight: 600; font-size: 12.5px; }
  .techn .tdesc { color: var(--muted); font-size: 11px; margin: 2px 0 5px; }
  .polrow { display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid var(--border); }
  .polrow:last-child { border-bottom: none; }
  .floorrow { display: flex; gap: 5px; align-items: center; margin: 3px 0; }
  .floorrow .fnum { width: 26px; color: var(--muted); font-size: 11px; flex: 0 0 auto; }
  .floorrow select { flex: 1; }
  .taxrow { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .taxrow .k { flex: 1; color: var(--muted); font-size: 12px; }
  .taxrow input[type=range] { flex: 1.4; }
  .taxrow .v { width: 38px; text-align: right; font-size: 12px; }

  /* Onderbalk */
  #bottombar { display: flex; align-items: center; gap: 6px; padding: 5px 10px;
    background: var(--panel); border-top: 1px solid var(--border); flex: 0 0 auto; overflow-x: auto; }
  .chip { display: flex; align-items: center; gap: 5px; background: var(--panel2);
    border: 1px solid var(--border); border-radius: 14px; padding: 3px 10px; font-size: 12px;
    white-space: nowrap; cursor: default; }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good); }
  #news { flex: 1; min-width: 120px; color: var(--muted); font-size: 12px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; text-align: right; }

  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="logo">🏙 MetroPlan</span>
    <div class="tstat"><span class="lbl">📅</span><b id="ui-date">1 jan 1925</b></div>
    <div id="speedctl">
      <button id="spd0" title="Pauze">⏸</button>
      <button id="spd1" class="active" title="Normaal">▶</button>
      <button id="spd2" title="Snel">▶▶</button>
      <button id="spd3" title="Zeer snel">▶▶▶</button>
    </div>
    <div class="tstat"><span class="lbl">💰</span><b id="ui-money">€ 0</b><span class="lbl" id="ui-cashflow"></span></div>
    <div class="tstat"><span class="lbl">👥</span><b id="ui-pop">0</b></div>
    <div class="tstat"><span class="lbl">🔬</span><b id="ui-rp">0</b></div>
    <div class="tstat" id="ui-phase" title="Stadsfase">Fase 1 · Dorp</div>
    <div class="spacer"></div>
    <select id="heatmapsel" title="Data-weergave (heatmap)"></select>
    <button id="btn-save" title="Opslaan">💾</button>
    <button id="btn-load" title="Laden">📂</button>
    <button id="btn-new" title="Nieuwe kaart">🗺</button>
  </div>

  <div id="main">
    <div id="left"></div>
    <div id="canvaswrap">
      <canvas id="canvas"></canvas>
      <div id="tooltip"></div>
      <div id="hint">Rechtermuisknop = schuiven (met inertie) · scroll = zoomen · G = grid · S = snappen · Alt = tijdelijk vrij plaatsen</div>
      <canvas id="minimap" width="150" height="150"></canvas>
      <div id="toasts"></div>
    </div>
    <div id="right">
      <div id="righttabs">
        <button data-tab="inspect" class="active">Inspecteur</button>
        <button data-tab="research">Onderzoek</button>
        <button data-tab="finance">Financiën</button>
        <button data-tab="policy">Beleid</button>
        <button data-tab="transit">OV</button>
        <button data-tab="stats">Stad</button>
      </div>
      <div id="rightbody"></div>
    </div>
  </div>

  <div id="bottombar">
    <div class="chip" id="chip-happy" title="Gemiddelde tevredenheid">😊 <b>–</b></div>
    <div class="chip" id="chip-budget" title="Maandelijks saldo">💰 <b>–</b></div>
    <div class="chip" id="chip-housing" title="Woningmarkt">🏠 <b>–</b></div>
    <div class="chip" id="chip-traffic" title="Verkeersdrukte">🚗 <b>–</b></div>
    <div class="chip" id="chip-edu" title="Onderwijsdekking">🏫 <b>–</b></div>
    <div class="chip" id="chip-health" title="Zorgdekking">🏥 <b>–</b></div>
    <div class="chip" id="chip-env" title="Milieu / luchtkwaliteit">🌳 <b>–</b></div>
    <div class="chip" id="chip-power" title="Elektriciteit">⚡ <b>–</b></div>
    <div class="chip" id="chip-water" title="Drinkwater">💧 <b>–</b></div>
    <div class="chip" id="chip-food" title="Voedsel">🌾 <b>–</b></div>
    <div id="news"></div>
  </div>
</div>
<script src="data.js"></script>
<script src="world.js"></script>
<script src="sim.js"></script>
<script src="render.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>
</body>
</html>

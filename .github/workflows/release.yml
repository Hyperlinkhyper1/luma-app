name: Release build

# Builds the Windows, Linux, Android, and iOS apps and publishes a GitHub
# Release on every push to master. The in-app updater (lib/app/update/)
# checks these releases and can self-update the installed build.
#
# The iOS build is unsigned (no Apple Developer account configured for this
# project), so the .ipa cannot be installed on a device as downloaded —
# resign it yourself with a free Apple ID via a tool like AltStore or
# Sideloadly first.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        shell: bash
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version

      - run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --no-tree-shake-icons --dart-define=APP_VERSION=${{ steps.ver.outputs.version }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            windows/installer/luma.iss

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: luma ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: dist/luma-setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        shell: bash
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version

      - run: flutter pub get

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libglib2.0-dev libgio-2.0-dev \
            libwebkit2gtk-4.1-dev libjsoncpp-dev libsecret-1-dev libfuse-dev

      - name: Build Linux release
        run: flutter build linux --release --no-tree-shake-icons --dart-define=APP_VERSION=${{ steps.ver.outputs.version }}

      - name: Archive Linux bundle
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "../../../luma-${{ steps.ver.outputs.version }}-linux-x64.tar.gz" .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: luma ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: build/linux/x64/release/luma-${{ steps.ver.outputs.version }}-linux-x64.tar.gz

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        shell: bash
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Gradle/AGP 8.7 (pinned in android/settings.gradle.kts) doesn't support
      # the very newest JDKs yet, same reason the local build pins JDK 21.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: flutter pub get

      # Reconstruct the release keystore from repo secrets so every CI build
      # is signed with the same persistent key. Without this, Gradle falls
      # back to a debug keystore that ephemeral runners regenerate per run,
      # giving every release a different signature — Android then refuses to
      # install any update over the previous one ("package conflicts with an
      # existing package").
      - name: Set up release signing
        shell: bash
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing — APK would get a throwaway debug signature and installed apps could never update. See android/key.properties on the dev machine."
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/luma-release.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=luma-release.jks
          EOF

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --dart-define=APP_VERSION=${{ steps.ver.outputs.version }}

      # Fail loudly if the APK somehow got a debug signature anyway — a
      # debug-signed release is worse than no release, because phones with
      # the proper release-signed app installed can never apply it.
      - name: Verify release signature
        shell: bash
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          CERT=$("$APKSIGNER" verify --print-certs build/app/outputs/flutter-apk/app-release.apk)
          echo "$CERT"
          if echo "$CERT" | grep -q "Android Debug"; then
            echo "::error::APK is debug-signed — signing config was not applied."
            exit 1
          fi

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/luma-${{ steps.ver.outputs.version }}.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: luma ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/luma-${{ steps.ver.outputs.version }}.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        shell: bash
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      # No Apple Developer account is configured for this project, so this
      # is an unsigned build (--no-codesign). It produces a real Runner.app
      # but isn't installable on a device as-is — the .ipa needs resigning
      # with at least a free Apple ID (e.g. via AltStore or Sideloadly)
      # before it can be sideloaded.
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign --no-tree-shake-icons --dart-define=APP_VERSION=${{ steps.ver.outputs.version }}

      # An .ipa is just a zip of Payload/<App>.app, so this doesn't require
      # Xcode's archive/export step (which needs a signing identity).
      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r "../../../luma-${{ steps.ver.outputs.version }}-unsigned.ipa" Payload

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: luma ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: luma-${{ steps.ver.outputs.version }}-unsigned.ipa

name: Release build

# Builds the Windows and Android apps and publishes a GitHub Release on every
# push to master. The in-app updater (lib/app/update/) checks these releases
# and can self-update the installed build.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        shell: bash
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter --version

      - run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release --no-tree-shake-icons --dart-define=APP_VERSION=${{ steps.ver.outputs.version }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            windows/installer/luma.iss

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: luma ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: dist/luma-setup.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        shell: bash
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Gradle/AGP 8.7 (pinned in android/settings.gradle.kts) doesn't support
      # the very newest JDKs yet, same reason the local build pins JDK 21.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --dart-define=APP_VERSION=${{ steps.ver.outputs.version }}

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/luma-${{ steps.ver.outputs.version }}.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: luma ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/luma-${{ steps.ver.outputs.version }}.apk
